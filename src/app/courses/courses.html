<h2 class="gluten">Kurser</h2>
<p>Nedan listas alla kurser som läses på MittUniversitetets webbutvecklingsprogram.</p>

@if(error()) {
    <p id="errorMessage">{{ error() }}</p>
}

<div id="table-wrapper">
<table id="courseTable">
    <tr>
        <th>Kurskod:</th>
        <th>Kursnamn:</th>
        <th>Progression:</th>
        <th>Kurslänk:</th>
    </tr>

    @for(course of courses(); track course.code) {
        <tr>
            <td>{{ course.code }}</td>
            <td>{{ course.coursename }}</td>
            <td>{{ course.progression }}</td>
            <td><a [href]="course.syllabus" target="_blank">Kursinformation</a></td>   <!--blank öppnar länk i ny flik-->
        </tr>
    }
</table>
</div>
